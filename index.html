<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Turquoise Steel is a Navajo family blues band from Albuquerque bringing desert blues, rock, and soul to live stages and late-night rooms."
    />
    <meta name="theme-color" content="#110f0d" />
    <title>Turquoise Steel | Desert Blues from Navajo Country</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon-64.svg" />
  </head>
  <body>
    <form name="newsletter" method="post" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="newsletter" />
      <input type="email" name="email" />
      <input type="text" name="bot-field" />
    </form>

    <form name="contact" method="post" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
