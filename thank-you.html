<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanks | Turquoise Steel</title>
    <link rel="icon" type="image/png" href="/images/favicon-64.png" />
    <style>
      :root {
        --bg: #0d0907;
        --panel: rgba(30, 23, 19, 0.94);
        --stroke: rgba(183, 173, 160, 0.2);
        --text: #ebe1d2;
        --muted: rgba(220, 205, 186, 0.72);
        --sand: #b18b5d;
        --bone: #dccdba;
        --turquoise: #7fa9a3;
        --copper: #c97927;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        font-family: "Gill Sans", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(920px 440px at 50% 104%, rgba(177, 139, 93, 0.32), transparent 58%),
          radial-gradient(760px 360px at 16% 12%, rgba(95, 52, 36, 0.3), transparent 60%),
          radial-gradient(700px 300px at 86% 14%, rgba(127, 169, 163, 0.16), transparent 58%),
          linear-gradient(180deg, #17110e 0%, #0d0907 42%, #070503 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background:
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 3px),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 4px);
        mix-blend-mode: soft-light;
      }

      main {
        width: min(100%, 980px);
      }

      .card {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.12fr) minmax(260px, 0.88fr);
        gap: 24px;
        padding: clamp(22px, 4vw, 40px);
        overflow: hidden;
        border-radius: 32px;
        border: 1px solid var(--stroke);
        background:
          radial-gradient(circle at top right, rgba(127, 169, 163, 0.18), transparent 34%),
          linear-gradient(180deg, var(--panel), rgba(12, 10, 8, 0.98));
        box-shadow: 0 28px 76px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(14px);
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 20%, transparent 82%, rgba(255, 255, 255, 0.04)),
          linear-gradient(300deg, rgba(201, 121, 39, 0.06), transparent 32%);
      }

      .copyWrap,
      .art {
        position: relative;
        z-index: 1;
      }

      .copyWrap {
        display: grid;
        align-content: center;
      }

      .art {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 11px;
        font-weight: 800;
        color: var(--sand);
      }

      .stamp {
        margin: 0 0 10px;
        font-family: "Segoe Script", "Brush Script MT", "Lucida Handwriting", cursive;
        font-size: clamp(22px, 4vw, 34px);
        line-height: 1;
        color: var(--copper);
        transform: rotate(-3deg);
        text-shadow: 0 10px 18px rgba(0, 0, 0, 0.24);
      }

      h1 {
        margin: 0 0 12px;
        font-family: "Baskerville Old Face", "Palatino Linotype", "Book Antiqua", serif;
        font-size: clamp(34px, 6vw, 60px);
        line-height: 0.92;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: transparent;
        background: linear-gradient(180deg, #f1ece4 0%, #d3c7ba 28%, #8e7e71 64%, #efe5d8 100%);
        -webkit-background-clip: text;
        background-clip: text;
      }

      .copy {
        max-width: 54ch;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .crest,
      .poster {
        border: 1px solid var(--stroke);
        background: rgba(255, 255, 255, 0.04);
      }

      .crest {
        width: 110px;
        height: 110px;
        display: grid;
        place-items: center;
        padding: 12px;
        border-radius: 24px;
        background:
          radial-gradient(circle at top, rgba(220, 205, 186, 0.12), transparent 48%),
          linear-gradient(180deg, rgba(71, 61, 55, 0.38), rgba(15, 12, 10, 0.84));
      }

      .poster {
        overflow: hidden;
        border-radius: 24px;
      }

      .poster img {
        width: 100%;
        display: block;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 14px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-decoration: none;
        border: 1px solid var(--stroke);
      }

      .primary {
        color: #15100c;
        background:
          linear-gradient(180deg, rgba(244, 239, 233, 0.98), rgba(183, 173, 160, 0.94) 38%, rgba(127, 169, 163, 0.96)),
          linear-gradient(120deg, rgba(127, 169, 163, 0.22), rgba(220, 205, 186, 0.18));
      }

      .secondary {
        color: var(--text);
        background: linear-gradient(180deg, rgba(31, 24, 20, 0.92), rgba(14, 11, 9, 0.98));
      }

      @media (max-width: 760px) {
        .card {
          grid-template-columns: 1fr;
        }

        .art {
          grid-template-columns: auto minmax(0, 1fr);
          align-items: start;
        }
      }

      @media (max-width: 560px) {
        .actions {
          display: grid;
        }

        a {
          width: 100%;
        }

        .art {
          grid-template-columns: 1fr;
        }

        .crest {
          width: 92px;
          height: 92px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="copyWrap">
          <p class="eyebrow">Message received</p>
          <p class="stamp">Thanks from Turquoise Steel.</p>
          <h1>Your message is on its way.</h1>
          <p class="copy">
            Your note has been sent to Turquoise Steel. A member of the band will follow up as soon as possible.
          </p>
          <div class="actions">
            <a class="primary" href="/">Back to homepage</a>
            <a class="secondary" href="mailto:turquoisesteel505@gmail.com">Email directly</a>
          </div>
        </div>

        <aside class="art" aria-hidden="true">
          <div class="crest">
            <img src="/images/band-logo.png" alt="" width="80" height="80" />
          </div>
          <div class="poster">
            <img src="/images/homeland-poster.png" alt="" />
          </div>
        </aside>
      </div>
    </main>
  </body>
</html>
