<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanks | Turquoise Steel</title>
    <link rel="icon" type="image/png" href="/images/favicon-64.png" />
    <style>
      :root {
        --bg: #110f0d;
        --panel: rgba(18, 15, 12, 0.86);
        --stroke: rgba(244, 237, 227, 0.12);
        --text: #f4ede3;
        --muted: rgba(244, 237, 227, 0.74);
        --sand: #dcc19a;
        --turquoise: #7ab8b2;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(900px 560px at 18% 10%, rgba(122, 184, 178, 0.16), transparent 60%),
          radial-gradient(820px 520px at 86% 20%, rgba(180, 134, 93, 0.18), transparent 58%),
          linear-gradient(180deg, rgba(8, 7, 5, 0.64), rgba(8, 7, 5, 0.96)),
          url("/images/background.jpg");
        background-color: var(--bg);
        background-position: center;
        background-size: cover;
      }

      main {
        width: min(100%, 960px);
      }

      .card {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(260px, 0.85fr);
        gap: 24px;
        padding: clamp(22px, 4vw, 40px);
        border-radius: 32px;
        background: var(--panel);
        border: 1px solid var(--stroke);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(16px);
      }

      .copyWrap {
        display: grid;
        align-content: center;
      }

      .art {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 12px;
        font-weight: 800;
        color: var(--sand);
      }

      h1 {
        margin: 0 0 12px;
        font-family: "Palatino Linotype", Georgia, serif;
        font-size: clamp(32px, 6vw, 58px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .copy {
        max-width: 52ch;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .crest,
      .poster {
        border: 1px solid var(--stroke);
        background: rgba(255, 255, 255, 0.04);
      }

      .crest {
        width: 108px;
        height: 108px;
        display: grid;
        place-items: center;
        padding: 12px;
        border-radius: 28px;
      }

      .poster {
        overflow: hidden;
        border-radius: 24px;
      }

      .poster img {
        width: 100%;
        display: block;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 999px;
        font-weight: 800;
        text-decoration: none;
        border: 1px solid var(--stroke);
      }

      .primary {
        color: #15100b;
        background: linear-gradient(135deg, var(--sand), var(--turquoise));
      }

      .secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
      }

      @media (max-width: 760px) {
        .card {
          grid-template-columns: 1fr;
        }

        .art {
          grid-template-columns: auto minmax(0, 1fr);
          align-items: start;
        }
      }

      @media (max-width: 560px) {
        .actions {
          display: grid;
        }

        a {
          width: 100%;
        }

        .art {
          grid-template-columns: 1fr;
        }

        .crest {
          width: 92px;
          height: 92px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="copyWrap">
          <p class="eyebrow">Message received</p>
          <h1>Thanks for reaching out.</h1>
          <p class="copy">
            Your submission was sent to Turquoise Steel's Netlify form inbox. If email notifications are enabled in
            Netlify, a copy will also be sent to <strong>turquoisesteel505@gmail.com</strong>.
          </p>
          <div class="actions">
            <a class="primary" href="/">Back to site</a>
            <a class="secondary" href="mailto:turquoisesteel505@gmail.com">Email directly</a>
          </div>
        </div>

        <aside class="art" aria-hidden="true">
          <div class="crest">
            <img src="/images/band-logo.png" alt="" width="80" height="80" />
          </div>
          <div class="poster">
            <img src="/images/homeland-poster.png" alt="" />
          </div>
        </aside>
      </div>
    </main>
  </body>
</html>
